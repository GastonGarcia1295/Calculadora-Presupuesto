<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculá tu Presupuesto | Desarrollo Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #f0f2f5; 
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .calc-container {
            background: #f0f2f5;
            box-shadow: 20px 20px 60px #cccfd3, -20px -20px 60px #ffffff;
            border-radius: 30px;
            width: 100%;
            max-width: 480px;
            padding: 35px;
        }
        .inner-neumorphic {
            background: #f0f2f5;
            box-shadow: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
            border-radius: 15px;
        }
        @media print {
            .no-print { display: none; }
            body { background: white; }
            .calc-container { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

    <div class="calc-container" id="ticket">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Calculá tu Presupuesto</h1>
            <p class="text-gray-500 text-sm mt-1">Estimación de costos para **Desarrollo Web**</p>
        </header>

        <div class="space-y-6">
            <div class="no-print">
                <label class="text-sm font-semibold text-gray-600 ml-1">Tipo de Proyecto</label>
                <select id="tipo" onchange="calcular()" class="w-full mt-2 p-3 bg-transparent border-2 border-gray-200 rounded-xl outline-none focus:border-indigo-500 transition-all font-medium">
                    <option value="60000">Landing Page (Base)</option>
                    <option value="150000">E-commerce Completo</option>
                    <option value="95000">Web Corporativa</option>
                    <option value="180000">Aplicación Web</option>
                </select>
            </div>

            <div class="no-print">
                <div class="flex justify-between text-sm font-semibold text-gray-600 ml-1">
                    <label>Páginas / Secciones</label>
                    <span id="valPaginas" class="text-indigo-600 font-bold text-lg">1</span>
                </div>
                <input type="range" id="paginas" min="1" max="15" value="1" oninput="actualizarValores()" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600 mt-4">
            </div>

            <div class="flex items-center gap-3 p-2 bg-white/30 rounded-xl no-print">
                <input type="checkbox" id="urgencia" onchange="calcular()" class="w-5 h-5 accent-indigo-600">
                <label for="urgencia" class="text-sm font-semibold text-gray-700 cursor-pointer">Entrega Urgente (+30%)</label>
            </div>

            <div class="bg-indigo-600 text-white rounded-2xl p-6 text-center shadow-lg shadow-indigo-200">
                <p class="text-indigo-100 text-xs font-bold uppercase tracking-widest mb-1">Presupuesto Final (ARS)</p>
                <h2 id="total" class="text-4xl font-bold">$0</h2>
            </div>

            <div class="p-6 inner-neumorphic">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold text-gray-700 uppercase tracking-wider">Conversor a USD</h3>
                    <span id="labelCotizacion" class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-bold">Cargando cotización...</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <label class="text-[9px] font-bold text-gray-400 absolute top-2 left-2 uppercase">Pesos</label>
                        <input type="number" id="arsInput" oninput="convertir('ars')" class="w-full pt-6 pb-2 px-2 bg-transparent border-b border-gray-300 outline-none font-bold text-sm" placeholder="0">
                    </div>
                    <div class="relative">
                        <label class="text-[9px] font-bold text-gray-400 absolute top-2 left-2 uppercase">Dólares</label>
                        <input type="number" id="usdInput" oninput="convertir('usd')" class="w-full pt-6 pb-2 px-2 bg-transparent border-b border-gray-300 outline-none font-bold text-sm text-indigo-600" placeholder="0">
                    </div>
                </div>
            </div>

            <button onclick="window.print()" class="no-print w-full bg-gray-800 hover:bg-black text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                <span>📄</span> Descargar Presupuesto en PDF
            </button>
        </div>
    </div>

    <script>
        let cotizacionActual = 1100; // Valor por defecto si falla la API

        // Función para obtener cotización real (Dolar Blue Argentina)
        async function obtenerCotizacion() {
            try {
                const response = await fetch('https://dolarapi.com/v1/dolares/blue');
                const data = await response.json();
                cotizacionActual = data.venta;
                document.getElementById('labelCotizacion').innerText = `Cotización Blue: $${cotizacionActual}`;
            } catch (error) {
                document.getElementById('labelCotizacion').innerText = `Cotización Est.: $${cotizacionActual}`;
            }
            calcular(); // Recalcular una vez obtenida la cotización
        }

        function actualizarValores() {
            document.getElementById('valPaginas').innerText = document.getElementById('paginas').value;
            calcular();
        }

        function calcular() {
            const base = parseInt(document.getElementById('tipo').value);
            const paginas = parseInt(document.getElementById('paginas').value);
            const esUrgente = document.getElementById('urgencia').checked;

            let subtotal = base + (base * 0.15 * (paginas - 1));
            if (esUrgente) subtotal *= 1.30;

            const totalFinal = Math.round(subtotal);
            document.getElementById('total').innerText = `$${totalFinal.toLocaleString('es-AR')}`;
            
            // Sincronizar conversor
            document.getElementById('arsInput').value = totalFinal;
            convertir('ars');
        }

        function convertir(origen) {
            const ars = document.getElementById('arsInput');
            const usd = document.getElementById('usdInput');

            if (origen === 'ars') {
                usd.value = (ars.value / cotizacionActual).toFixed(2);
            } else {
                ars.value = (usd.value * cotizacionActual).toFixed(0);
            }
        }
        
        // Iniciar obteniendo cotización real
        obtenerCotizacion();
    </script>
</body>
</html>
